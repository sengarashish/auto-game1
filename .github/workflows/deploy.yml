name: Deploy to GitHub Pages

# Builds the static site and publishes it to GitHub Pages on push to main.
# IMPORTANT: set BASE_PATH below to "/<your-repo-name>/" for project sites,
# or leave it as "/" if deploying to a user/org root or a custom domain.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test
      - name: Build
        run: npm run build
        env:
          BASE_PATH: /auto-game1/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
